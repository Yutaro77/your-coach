<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CLEW 食事記録</title>

<style>
  /* ---------------------------------------------------------------
     Tokens — Apple system colors (iOS light / dark actual values)
  --------------------------------------------------------------- */
  :root {
    --bg: #ffffff;
    --card: #f2f2f7;
    --card-elevated: #ffffff;
    --sheet: rgba(249, 249, 251, 0.82);
    --header: rgba(255, 255, 255, 0.72);
    --separator: #e5e5ea;
    --label: #000000;
    --label-2: rgba(60, 60, 67, 0.6);
    --label-3: rgba(60, 60, 67, 0.3);
    --fill: rgba(120, 120, 128, 0.12);
    --track: rgba(120, 120, 128, 0.16);

    --blue: #007aff;
    --orange: #ff9500;
    --yellow: #ffcc00;
    --green: #34c759;

    --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow-fab: 0 6px 20px rgba(0, 122, 255, 0.32), 0 2px 6px rgba(0, 0, 0, 0.12);
    --shadow-sheet: 0 -1px 0 rgba(0, 0, 0, 0.06), 0 -12px 40px rgba(0, 0, 0, 0.14);

    --r-card: 18px;
    --r-tile: 14px;

    --ease: cubic-bezier(0.32, 0.72, 0, 1);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --card: #1c1c1e;
      --card-elevated: #1c1c1e;
      --sheet: rgba(30, 30, 32, 0.82);
      --header: rgba(0, 0, 0, 0.62);
      --separator: #38383a;
      --label: #ffffff;
      --label-2: rgba(235, 235, 245, 0.6);
      --label-3: rgba(235, 235, 245, 0.3);
      --fill: rgba(120, 120, 128, 0.24);
      --track: rgba(120, 120, 128, 0.28);

      --blue: #0a84ff;
      --orange: #ff9f0a;
      --yellow: #ffd60a;
      --green: #30d158;

      --shadow-card: none;
      --shadow-fab: 0 6px 20px rgba(10, 132, 255, 0.36), 0 2px 6px rgba(0, 0, 0, 0.4);
      --shadow-sheet: 0 -1px 0 rgba(255, 255, 255, 0.08), 0 -12px 40px rgba(0, 0, 0, 0.6);
    }
  }

  :root[data-theme="dark"] {
    --bg: #000000;
    --card: #1c1c1e;
    --card-elevated: #1c1c1e;
    --sheet: rgba(30, 30, 32, 0.82);
    --header: rgba(0, 0, 0, 0.62);
    --separator: #38383a;
    --label: #ffffff;
    --label-2: rgba(235, 235, 245, 0.6);
    --label-3: rgba(235, 235, 245, 0.3);
    --fill: rgba(120, 120, 128, 0.24);
    --track: rgba(120, 120, 128, 0.28);
    --blue: #0a84ff;
    --orange: #ff9f0a;
    --yellow: #ffd60a;
    --green: #30d158;
    --shadow-card: none;
    --shadow-fab: 0 6px 20px rgba(10, 132, 255, 0.36), 0 2px 6px rgba(0, 0, 0, 0.4);
    --shadow-sheet: 0 -1px 0 rgba(255, 255, 255, 0.08), 0 -12px 40px rgba(0, 0, 0, 0.6);
  }

  :root[data-theme="light"] {
    --bg: #ffffff;
    --card: #f2f2f7;
    --card-elevated: #ffffff;
    --sheet: rgba(249, 249, 251, 0.82);
    --header: rgba(255, 255, 255, 0.72);
    --separator: #e5e5ea;
    --label: #000000;
    --label-2: rgba(60, 60, 67, 0.6);
    --label-3: rgba(60, 60, 67, 0.3);
    --fill: rgba(120, 120, 128, 0.12);
    --track: rgba(120, 120, 128, 0.16);
    --blue: #007aff;
    --orange: #ff9500;
    --yellow: #ffcc00;
    --green: #34c759;
    --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow-fab: 0 6px 20px rgba(0, 122, 255, 0.32), 0 2px 6px rgba(0, 0, 0, 0.12);
    --shadow-sheet: 0 -1px 0 rgba(0, 0, 0, 0.06), 0 -12px 40px rgba(0, 0, 0, 0.14);
  }

  /* ---------------------------------------------------------------
     Base
  --------------------------------------------------------------- */
  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--label);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Hiragino Sans",
      "Hiragino Kaku Gothic ProN", "Yu Gothic", system-ui, sans-serif;
    font-size: 17px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    font-variant-numeric: tabular-nums;
  }

  button {
    font: inherit;
    color: inherit;
    background: none;
    border: 0;
    padding: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  :focus-visible {
    outline: 2px solid var(--blue);
    outline-offset: 2px;
    border-radius: 6px;
  }

  .num { font-variant-numeric: tabular-nums; }

  /* Device shell: full-bleed on phones, framed on desktop */
  .app {
    position: relative;
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    /* モバイルでも固定高のコンテナにする。FAB・シート・解析画面は絶対配置なので、
       body スクロールにすると画面外へ流れてしまう。スクロールは .scroll だけが担う。 */
    height: 100vh;
    height: 100dvh;
    background: var(--bg);
    /* シート/解析画面は translateY で画面外へ退避する。hidden だとフォーカス移動で
       このコンテナ自体がプログラム的にスクロールしてしまうため clip で固定する。 */
    overflow: hidden;
    overflow: clip;
  }

  @media (min-width: 480px) {
    body {
      background: color-mix(in srgb, var(--label) 6%, var(--bg));
      padding: 24px 0;
    }
    .app {
      min-height: 812px;
      height: 812px;
      border-radius: 42px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.22), 0 0 0 1px var(--separator);
      overflow: hidden;
      overflow: clip;
    }
  }

  /* ---------------------------------------------------------------
     Header — glass
  --------------------------------------------------------------- */
  .header {
    position: sticky;
    top: 0;
    z-index: 30;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 20px 10px;
    background: var(--header);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 0.5px solid var(--separator);
  }

  .header h1 {
    margin: 0;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .header .date {
    margin: 2px 0 0;
    font-size: 13px;
    color: var(--label-2);
    letter-spacing: 0.01em;
  }

  .avatar {
    flex: none;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: linear-gradient(160deg, #a1c4fd, #5b8def);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    display: grid;
    place-items: center;
    transition: transform 0.2s var(--ease);
  }
  .avatar:active { transform: scale(0.92); }

  /* ---------------------------------------------------------------
     Scroll body
  --------------------------------------------------------------- */
  .scroll {
    height: calc(100% - 66px);
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    padding: 16px 20px calc(120px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 14px;
  }


  .card {
    background: var(--card);
    border-radius: var(--r-card);
    box-shadow: var(--shadow-card);
  }

  /* ---------------------------------------------------------------
     Rings
  --------------------------------------------------------------- */
  .rings-card { padding: 20px 18px 16px; }

  .rings-top {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .dial { position: relative; flex: none; width: 140px; height: 140px; }
  .dial svg { display: block; transform: rotate(-90deg); }

  .dial-track { stroke: var(--track); }

  .dial-arc {
    stroke-linecap: round;
    transition: stroke-dashoffset 1.1s var(--ease);
  }
  #arc-p { stroke: var(--blue); }
  #arc-c { stroke: var(--orange); }
  #arc-f { stroke: var(--yellow); }

  .dial-center {
    position: absolute;
    inset: 0;
    display: grid;
    place-content: center;
    text-align: center;
    gap: 1px;
  }

  .dial-kcal {
    font-size: 27px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .dial-unit {
    font-size: 10px;
    font-weight: 600;
    color: var(--label-2);
    letter-spacing: 0.03em;
  }

  .legend {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 0;
  }

  .leg-row { display: flex; flex-direction: column; gap: 5px; }

  .leg-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
  }

  .leg-name {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--label-2);
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex: none;
  }

  .leg-val { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .leg-val span { color: var(--label-3); font-weight: 500; font-size: 12px; }

  .bar {
    height: 5px;
    border-radius: 3px;
    background: var(--track);
    overflow: hidden;
  }

  .bar > i {
    display: block;
    height: 100%;
    border-radius: 3px;
    width: 0;
    transition: width 1.1s var(--ease);
  }

  .rings-foot {
    margin-top: 16px;
    padding-top: 13px;
    border-top: 0.5px solid var(--separator);
    display: flex;
    justify-content: space-between;
    gap: 10px;
  }

  .foot-item { display: flex; flex-direction: column; gap: 2px; }
  .foot-k { font-size: 11px; color: var(--label-2); letter-spacing: 0.02em; }
  .foot-v { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }

  /* ---------------------------------------------------------------
     AI summary — one card, three-second read
  --------------------------------------------------------------- */
  .ai {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 15px 16px;
  }

  .ai-mark {
    flex: none;
    width: 26px;
    height: 26px;
    display: grid;
    place-items: center;
  }

  .ai-mark svg { display: block; }

  .ai-text {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.35;
    text-wrap: balance;
  }
  .ai-text b { color: var(--blue); font-weight: 700; }
  .ai-note {
    display: block;
    margin-top: 6px;
    font-size: 12px;
    font-weight: 500;
    color: var(--label-2);
    line-height: 1.45;
    letter-spacing: 0;
  }

  /* ---------------------------------------------------------------
     Timeline
  --------------------------------------------------------------- */
  .sec-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 8px 4px 0;
  }

  .sec-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .sec-meta { font-size: 13px; color: var(--label-2); }

  .timeline { display: flex; flex-direction: column; gap: 10px; }

  .meal {
    display: flex;
    gap: 13px;
    padding: 12px;
    align-items: center;
    text-align: left;
    width: 100%;
    transition: transform 0.2s var(--ease), background 0.2s;
  }
  .meal:active { transform: scale(0.985); }

  .meal.enter { animation: mealIn 0.5s var(--ease) both; }

  @keyframes mealIn {
    from { opacity: 0; transform: translateY(10px) scale(0.98); }
    to { opacity: 1; transform: none; }
  }

  /* 未記録（沈黙）。responsibility: 責めない・静かに空いていることだけ示す。
     「食べなかった」とは決して読ませない。 */
  .meal.ghost {
    background: transparent;
    box-shadow: inset 0 0 0 1px var(--separator);
    border-radius: var(--r-card);
  }

  .ghost-thumb {
    flex: none;
    width: 62px;
    height: 62px;
    border-radius: var(--r-tile);
    display: grid;
    place-items: center;
    color: var(--label-3);
    box-shadow: inset 0 0 0 1.5px var(--separator);
  }

  .meal.ghost .meal-items,
  .meal.skipped .meal-items { color: var(--label-3); font-weight: 500; }

  .ghost-cta {
    flex: none;
    align-self: center;
    font-size: 14px;
    font-weight: 600;
    color: var(--blue);
  }

  /* 食べていない（本人の明示的な申告）。未記録とは別の状態として見せる。 */
  .meal.skipped { background: transparent; box-shadow: inset 0 0 0 1px var(--separator); }
  .meal.skipped .ghost-thumb { color: var(--label-3); }
  .skipped-tag {
    flex: none;
    align-self: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--label-2);
    background: var(--fill);
    padding: 4px 9px;
    border-radius: 7px;
  }

  /* セクション見出しの内訳（記録済み / 未記録） */
  .sec-meta .unrec { color: var(--label-3); }

  .thumb {
    flex: none;
    width: 62px;
    height: 62px;
    border-radius: var(--r-tile);
    display: grid;
    place-items: center;
    font-size: 30px;
    line-height: 1;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.06);
  }
  .thumb::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(150deg, rgba(255, 255, 255, 0.34), transparent 58%);
  }

  .meal-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }

  .meal-slot {
    font-size: 11px;
    font-weight: 700;
    color: var(--label-2);
    letter-spacing: 0.06em;
  }

  .meal-items {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .macros { display: flex; align-items: center; gap: 8px; margin-top: 2px; }

  .macro {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 5px;
    letter-spacing: 0.01em;
  }
  .m-p { color: var(--blue); background: color-mix(in srgb, var(--blue) 12%, transparent); }
  .m-c { color: var(--orange); background: color-mix(in srgb, var(--orange) 14%, transparent); }
  .m-f { color: #a97b00; background: color-mix(in srgb, var(--yellow) 22%, transparent); }
  :root[data-theme="dark"] .m-f,
  :root:not([data-theme="light"]) .m-f { color: var(--yellow); }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) .m-f { color: #a97b00; }
  }

  .meal-kcal {
    flex: none;
    align-self: center;
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .meal-kcal b { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
  .meal-kcal span { font-size: 10px; color: var(--label-3); font-weight: 600; }

  /* Repeat / quick add */
  .quick {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 13px 14px;
    width: 100%;
    text-align: left;
    border: 0.5px dashed var(--separator);
    background: transparent;
    border-radius: var(--r-card);
    transition: transform 0.2s var(--ease), background 0.2s;
  }
  .quick:active { transform: scale(0.985); background: var(--fill); }

  .quick-ic {
    flex: none;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: color-mix(in srgb, var(--blue) 12%, transparent);
    color: var(--blue);
    display: grid;
    place-items: center;
  }

  .quick-t { flex: 1; min-width: 0; }
  .quick-t b { display: block; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .quick-t span { font-size: 12px; color: var(--label-2); }
  .quick-add { flex: none; font-size: 14px; font-weight: 600; color: var(--blue); }

  /* ---------------------------------------------------------------
     FAB
  --------------------------------------------------------------- */
  .fab-wrap {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 40;
    display: grid;
    place-items: center;
    padding: 0 0 calc(22px + env(safe-area-inset-bottom));
    pointer-events: none;
    background: linear-gradient(to top, var(--bg) 58%, transparent);
    padding-top: 20px;
  }

  .fab {
    pointer-events: auto;
    width: 62px;
    height: 62px;
    border-radius: 50%;
    background: var(--blue);
    color: #fff;
    display: grid;
    place-items: center;
    box-shadow: var(--shadow-fab);
    transition: transform 0.24s var(--ease);
  }
  .fab:active { transform: scale(0.9); }
  .fab svg { display: block; transition: transform 0.3s var(--ease); }

  /* ---------------------------------------------------------------
     Sheet
  --------------------------------------------------------------- */
  .scrim {
    position: absolute;
    inset: 0;
    z-index: 50;
    background: rgba(0, 0, 0, 0.28);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.32s var(--ease);
  }
  .scrim.on { opacity: 1; pointer-events: auto; }

  .sheet {
    position: absolute;
    left: 8px;
    right: 8px;
    bottom: 0;
    z-index: 60;
    transform: translateY(115%);
    transition: transform 0.42s var(--ease);
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .sheet.on { transform: translateY(0); }

  .sheet-group {
    background: var(--sheet);
    backdrop-filter: saturate(180%) blur(24px);
    -webkit-backdrop-filter: saturate(180%) blur(24px);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-sheet);
  }

  .sheet-hd {
    text-align: center;
    padding: 13px 16px 11px;
    font-size: 13px;
    color: var(--label-2);
    border-bottom: 0.5px solid var(--separator);
  }

  .opt {
    display: flex;
    align-items: center;
    gap: 13px;
    width: 100%;
    padding: 15px 18px;
    text-align: left;
    border-bottom: 0.5px solid var(--separator);
    transition: background 0.15s;
  }
  .opt:last-child { border-bottom: 0; }
  .opt:active { background: var(--fill); }

  .opt-ic { flex: none; width: 26px; display: grid; place-items: center; color: var(--blue); }
  .opt-t { flex: 1; font-size: 17px; font-weight: 500; letter-spacing: -0.01em; }
  .opt-hint { font-size: 12px; color: var(--label-3); }
  .opt.primary .opt-t { font-weight: 600; }

  .sheet-cancel {
    background: var(--card-elevated);
    border-radius: 16px;
    padding: 16px;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    color: var(--blue);
    box-shadow: var(--shadow-sheet);
    width: 100%;
  }
  .sheet-cancel:active { background: var(--fill); }

  /* ---------------------------------------------------------------
     Capture + analysis screen
  --------------------------------------------------------------- */
  .screen {
    position: absolute;
    inset: 0;
    z-index: 70;
    background: var(--bg);
    transform: translateY(100%);
    transition: transform 0.42s var(--ease);
    display: flex;
    flex-direction: column;
  }
  .screen.on { transform: translateY(0); }

  .screen-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 0.5px solid var(--separator);
    flex: none;
  }
  .screen-nav .nav-btn { font-size: 17px; color: var(--blue); }
  .screen-nav .nav-title { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }

  .screen-body {
    flex: 1;
    overflow-y: auto;
    padding: 18px 20px calc(28px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .shot {
    width: 100%;
    aspect-ratio: 4 / 3;
    border-radius: 20px;
    display: grid;
    place-items: center;
    font-size: 84px;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.06);
  }
  .shot::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(155deg, rgba(255, 255, 255, 0.3), transparent 55%);
  }

  /* shimmer skeleton */
  .skel {
    border-radius: 8px;
    background: linear-gradient(90deg, var(--fill) 25%, var(--track) 37%, var(--fill) 63%);
    background-size: 320% 100%;
    animation: shimmer 1.2s linear infinite;
  }
  @keyframes shimmer {
    from { background-position: 100% 0; }
    to { background-position: -100% 0; }
  }

  .analyzing { display: flex; flex-direction: column; gap: 10px; }
  .analyzing .skel:nth-child(1) { height: 22px; width: 62%; }
  .analyzing .skel:nth-child(2) { height: 15px; width: 40%; }
  .analyzing .skel:nth-child(3) { height: 74px; width: 100%; border-radius: 14px; }

  .result { display: flex; flex-direction: column; gap: 16px; animation: fadeUp 0.42s var(--ease) both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: none; }
  }

  .dish-name { font-size: 24px; font-weight: 700; letter-spacing: -0.025em; line-height: 1.2; }
  .dish-conf {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 600;
    color: var(--green);
    margin-top: 5px;
  }

  /* weight stepper — the only editable field */
  .stepper {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 14px 14px 18px;
    gap: 12px;
  }

<!-- LIFF SDK。LIFF外（普通のブラウザ・プレビュー）では読み込まれず、自動でデモ動作になる。 -->
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
  (function () {
    "use strict";

    // ------------------------------------------------------------
    // 接続設定（LIFF に載せるときはここだけ埋める）
    // ------------------------------------------------------------
    var LIFF_ID = "2010429232-kemGX9M5";
    var API_BASE = "https://nirneeiegkarqtyxbkop.supabase.co/functions/v1/line-webhook";

    // LIFF の外（普通のブラウザ）で開いた場合はデモデータで動かす。
    // 実データかデモかは画面上でも分かるようにする（取り違えると事故になる）。
    var online = false;
    var idToken = null;

    async function api(path, options) {
      var res = await fetch(API_BASE + path, Object.assign({
        headers: {
          "content-type": "application/json",
          "authorization": "Bearer " + idToken,
        },
      }, options || {}));
      if (!res.ok) throw new Error("api " + path + " -> " + res.status);
      return res.json();
    }

    async function connect() {
      if (typeof liff === "undefined" || !LIFF_ID) return false;
      try {
        await liff.init({ liffId: LIFF_ID });
        // LINE の外（普通のブラウザ）ではログインへ飛ばさずデモのままにする。
        // 飛ばすと動作確認もプレビューもできなくなるため。
        if (!liff.isInClient() && !liff.isLoggedIn()) return false;
        if (!liff.isLoggedIn()) { liff.login(); return false; }
        idToken = liff.getIDToken();
        return !!idToken;
      } catch (_) {
        return false;
      }
    }

    // ------------------------------------------------------------
    // Model
    // ------------------------------------------------------------
    var GOAL = { kcal: 2300, p: 150, c: 260, f: 65 };
    /** 週の再配分で目標が動いたときの説明（サーバが文にしたものをそのまま出す）。 */
    var ADJUST_NOTE = "";

    // 1日の食事枠は「n食目」。プランで決めた食数だけ枠を用意する。
    // 各枠は3状態を持つ:
    //   recorded   … 記録あり
    //   unrecorded … 未記録（沈黙）。「食べなかった」とは絶対に解釈しない
    //   skipped    … 本人が「食べていない」と明示的に申告した
    var MEALS_PER_DAY = 4;

    var SLOTS = [];
    for (var i = 1; i <= MEALS_PER_DAY; i++) SLOTS.push(i + "食目");

    var log = {};
    function resetLog() {
      log = {};
      SLOTS.forEach(function (s) { log[s] = { status: "unrecorded", entries: [] }; });
    }
    resetLog();

    /**
     * デモ用のダミー記録。**オフラインだと確定したときにだけ**呼ぶ。
     * 記録アプリで、記録していないものを一瞬でも実データとして見せてはいけない。
     */
    function seedDemo() {
      resetLog();
      [
        ["1食目", { time: "7:20", items: "オイコス・バナナ・プロテイン", kcal: 420, p: 32, c: 41, f: 3, emoji: "🥛", tint: ["#FFE7C2", "#FFC97A"] }],
        ["2食目", { time: "12:40", items: "サーモン定食", kcal: 830, p: 41, c: 114, f: 22, emoji: "🍱", tint: ["#FFD9CF", "#FF9E80"] }],
        ["3食目", { time: "16:05", items: "プロテイン", kcal: 120, p: 24, c: 3, f: 1, emoji: "🥤", tint: ["#D9E7FF", "#8FB4FF"] }]
      ].forEach(function (pair) {
        if (!log[pair[0]]) return;
        log[pair[0]].status = "recorded";
        log[pair[0]].entries.push(pair[1]);
      });
      // 週の再配分（T5）が出ている状態もプレビューできるようにしておく
      GOAL.kcal = 2120;
      ADJUST_NOTE = "今週はここまで900kcal多め。残り5日で均すから、今日は2120kcal（-180kcal）にしよう。";
    }

    var LIBRARY = {
      photo: { name: "鶏むね肉のサラダボウル", grams: 320, kcal: 480, p: 45, c: 38, f: 14, emoji: "🥗", tint: ["#DFF3DC", "#93D18C"] },
      barcode: { name: "ザバス ミルクプロテイン", grams: 430, kcal: 103, p: 15, c: 10, f: 0, emoji: "🥛", tint: ["#E3EAFF", "#9DB2FF"] }
    };

    // 履歴・お気に入りは自分の記録から作る（recentItems/favItems）。
    // ここに固定データを置くと、タップした瞬間に食べていないものが記録に入る。

    // ------------------------------------------------------------
    // Helpers
    // ------------------------------------------------------------
    function $(id) { return document.getElementById(id); }
    function fmt(n) { return Math.round(n).toLocaleString("en-US"); }
    function clamp01(v) { return Math.max(0, Math.min(1, v)); }
    function tint(pair) {
      return "background:linear-gradient(145deg," + pair[0] + "," + pair[1] + ")";
    }

    /** 合計は「記録済みの実績」だけ。未記録の枠を 0 として足し込まない。 */
    function totals() {
      var a = { kcal: 0, p: 0, c: 0, f: 0 };
      SLOTS.forEach(function (s) {
        log[s].entries.forEach(function (e) {
          a.kcal += e.kcal; a.p += e.p; a.c += e.c; a.f += e.f;
        });
      });
      return a;
    }

    /** 枠の合計（1枠に複数記録できるため）。 */
    function slotTotals(s) {
      return log[s].entries.reduce(function (a, e) {
        a.kcal += e.kcal; a.p += e.p; a.c += e.c; a.f += e.f;
        a.grams += e.grams || 0;
        return a;
      }, { kcal: 0, p: 0, c: 0, f: 0, grams: 0 });
    }

    function countByStatus(st) {
      return SLOTS.filter(function (s) { return log[s].status === st; }).length;
    }

    /** ＋から記録するときの既定枠＝まだ埋まっていない最初の枠。 */
    function nextOpenSlot() {
      for (var i = 0; i < SLOTS.length; i++) {
        if (log[SLOTS[i]].status === "unrecorded") return SLOTS[i];
      }
      return SLOTS[SLOTS.length - 1];
    }

    function nowHM() {
      var d = new Date();
      return d.getHours() + ":" + String(d.getMinutes()).padStart(2, "0");
    }

    // ------------------------------------------------------------
    // Render: date
    // ------------------------------------------------------------
    (function renderDate() {
      var d = new Date();
      var w = ["日", "月", "火", "水", "木", "金", "土"][d.getDay()];
      $("today-date").textContent = (d.getMonth() + 1) + "月" + d.getDate() + "日 " + w + "曜日";
    })();

    // ------------------------------------------------------------
    // Render: rings + legend + AI line
    // ------------------------------------------------------------
    var RADII = { p: 63, c: 50, f: 37 };

    function setArc(id, key, ratio) {
      var el = $(id);
      var circ = 2 * Math.PI * RADII[key];
      el.setAttribute("stroke-dasharray", circ.toFixed(2));
      el.setAttribute("stroke-dashoffset", (circ * (1 - clamp01(ratio))).toFixed(2));
    }

    function renderSummary(animate) {
      var t = totals();
      var leftK = Math.max(0, GOAL.kcal - t.kcal);
      var pct = Math.round((t.kcal / GOAL.kcal) * 100);

      $("kcal-left").textContent = fmt(leftK);
      $("foot-eaten").textContent = fmt(t.kcal) + " kcal";
      $("foot-left").textContent = fmt(leftK) + " kcal";
      $("foot-pct").textContent = pct + "%";

      $("p-now").textContent = fmt(t.p);
      $("c-now").textContent = fmt(t.c);
      $("f-now").textContent = fmt(t.f);
      $("p-goal").textContent = GOAL.p;
      $("c-goal").textContent = GOAL.c;
      $("f-goal").textContent = GOAL.f;

      var rp = t.p / GOAL.p, rc = t.c / GOAL.c, rf = t.f / GOAL.f;

      function apply() {
        setArc("arc-p", "p", rp);
        setArc("arc-c", "c", rc);
        setArc("arc-f", "f", rf);
        $("bar-p").style.width = (clamp01(rp) * 100) + "%";
        $("bar-c").style.width = (clamp01(rc) * 100) + "%";
        $("bar-f").style.width = (clamp01(rf) * 100) + "%";
      }

      if (animate) {
        setArc("arc-p", "p", 0); setArc("arc-c", "c", 0); setArc("arc-f", "f", 0);
        requestAnimationFrame(function () { requestAnimationFrame(apply); });
      } else {
        apply();
      }

      renderAI(t, leftK);
    }

    // One card. One sentence. Names the single lever that matters most.
    // タンパク質を最優先で見る（筋量維持がこのプロダクトの主目的。脂質不足は指摘しない）。
    function renderAI(t, leftK) {
      var pLeft = GOAL.p - t.p;
      var cLeft = GOAL.c - t.c;
      var msg;

      // 未記録の枠は「食べていない」ではない。残り何食で届くかだけを示す。
      var open = countByStatus("unrecorded");

      if (pLeft > 0) {
        msg = "あと<b>タンパク質" + Math.round(pLeft) + "g</b>で目標達成です。";
        if (open > 0) {
          msg = "あと<b>タンパク質" + Math.round(pLeft) + "g</b>。残り" + open + "食で届きます。";
        }
        if (leftK <= 0) {
          msg = "カロリーは目標に到達。<b>タンパク質があと" + Math.round(pLeft) + "g</b>です。";
        }
      } else if (leftK > 0) {
        msg = "タンパク質は達成。あと<b>" + fmt(leftK) + "kcal</b>の余裕があります。";
      } else if (cLeft < 0) {
        msg = "今日は目標を少し超えました。<b>明日で調整</b>しましょう。";
      } else {
        msg = "今日の目標はすべて達成です。";
      }
      // 週の再配分があった日は、その理由も併記する（なぜ目標が動いたのか隠さない）
      $("ai-text").innerHTML = msg +
        (ADJUST_NOTE ? '<span class="ai-note">' + esc(ADJUST_NOTE) + "</span>" : "");
    }

    // ------------------------------------------------------------
    // Render: timeline
    // ------------------------------------------------------------
    var GHOST_ICON =
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">' +
      '<path d="M12 6.5v11M6.5 12h11" stroke="currentColor" stroke-width="2" ' +
      'stroke-linecap="round"/></svg>';

    /** 記録済みの枠。1枠に複数記録がある場合はまとめて1枚に見せる。 */
    function recordedNode(s, isNew) {
      var t = slotTotals(s);
      var es = log[s].entries;
      var head = es[0];
      var items = es.map(function (e) { return e.items; }).join("・");
      var b = document.createElement("button");
      b.className = "card meal" + (isNew ? " enter" : "");
      b.dataset.slot = s;
      b.innerHTML =
        '<span class="thumb" style="' + tint(head.tint) + '">' + head.emoji + "</span>" +
        '<span class="meal-body">' +
          '<span class="meal-slot">' + s + (head.time ? " · " + head.time : "") + "</span>" +
          '<span class="meal-items">' + items + "</span>" +
          '<span class="macros">' +
            '<span class="macro m-p num">P ' + fmt(t.p) + "</span>" +
            '<span class="macro m-c num">C ' + fmt(t.c) + "</span>" +
            '<span class="macro m-f num">F ' + fmt(t.f) + "</span>" +
          "</span>" +
        "</span>" +
        '<span class="meal-kcal"><b class="num">' + fmt(t.kcal) + "</b><span>KCAL</span></span>";
      return b;
    }

    /** 未記録（沈黙）。空欄として残し続けるのが目的。責める言葉は使わない。 */
    function ghostNode(s) {
      var b = document.createElement("button");
      b.className = "meal ghost";
      b.dataset.slot = s;
      b.innerHTML =
        '<span class="ghost-thumb">' + GHOST_ICON + "</span>" +
        '<span class="meal-body">' +
          '<span class="meal-slot">' + s + "</span>" +
          '<span class="meal-items">未記録</span>' +
        "</span>" +
        '<span class="ghost-cta">記録する</span>';
      return b;
    }

    /** 食べていない（本人の申告）。未記録とは別物として表示する。 */
    function skippedNode(s) {
      var b = document.createElement("button");
      b.className = "meal skipped";
      b.dataset.slot = s;
      b.innerHTML =
        '<span class="ghost-thumb">' + GHOST_ICON + "</span>" +
        '<span class="meal-body">' +
          '<span class="meal-slot">' + s + "</span>" +
          '<span class="meal-items">食べていない</span>' +
        "</span>" +
        '<span class="skipped-tag">申告済み</span>';
      return b;
    }

    function renderTimeline(newSlot) {
      var tl = $("timeline");
      tl.innerHTML = "";
      SLOTS.forEach(function (s) {
        var st = log[s].status;
        if (st === "recorded") tl.appendChild(recordedNode(s, s === newSlot));
        else if (st === "skipped") tl.appendChild(skippedNode(s));
        else tl.appendChild(ghostNode(s));
      });

      // 「何件記録したか」と「いくつ空いているか」を両方見せる（沈黙を数える）
      var rec = countByStatus("recorded");
      var unrec = countByStatus("unrecorded");
      $("meal-count").innerHTML = rec + " / " + MEALS_PER_DAY + "食" +
        (unrec ? ' <span class="unrec">· 未記録' + unrec + "</span>" : "");
    }

    // ------------------------------------------------------------
    // Toast
    // ------------------------------------------------------------
    var toastTimer;
    function toast(text) {
      $("toast-text").textContent = text;
      var el = $("toast");
      el.classList.add("on");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { el.classList.remove("on"); }, 1900);
    }

    // ------------------------------------------------------------
    // Sheet
    // ------------------------------------------------------------
    var sheetOpen = false;
    // どの枠に記録しようとしているか。枠から開いたときだけ「食べていない」を出す。
    var pendingSlot = null;

    function setSheet(on, slot) {
      sheetOpen = on;
      if (on) {
        pendingSlot = slot || null;
        $("sheet-hd").textContent = pendingSlot ? pendingSlot + "を記録する" : "記録する";
        $("skip-group").hidden = !pendingSlot;
      }
      $("sheet").classList.toggle("on", on);
      $("scrim").classList.toggle("on", on);
      $("fab").querySelector("svg").style.transform = on ? "rotate(45deg)" : "";
    }

    $("fab").addEventListener("click", function () { setSheet(!sheetOpen); });
    $("scrim").addEventListener("click", function () { setSheet(false); });
    $("sheet-cancel").addEventListener("click", function () { setSheet(false); });

    // 枠をタップ → その枠を指定して記録シートを開く
    $("timeline").addEventListener("click", function (e) {
      var btn = e.target.closest("[data-slot]");
      if (btn) setSheet(true, btn.dataset.slot);
    });

    // ------------------------------------------------------------
    // Screen (analysis / lists)
    // ------------------------------------------------------------
    function openScreen(title) {
      $("screen-title").textContent = title;
      $("screen").classList.add("on");
    }
    function closeScreen() { $("screen").classList.remove("on"); }
    $("screen-back").addEventListener("click", closeScreen);

    /** 枠名（"2食目"）→ サーバの slot 番号。 */
    function slotNo(s) { return parseInt(s, 10); }

    /** サーバに保存する。オフライン（デモ）のときは何もしない。 */
    function push(body) {
      if (!online) return;
      api("/liff/meal", { method: "POST", body: JSON.stringify(body) })
        .catch(function () { toast("保存できなかった。通信を確認してね"); });
    }

    // Commit a meal into today's log
    function commit(entry, slot) {
      var s = slot || pendingSlot || nextOpenSlot();
      var rec = {
        time: nowHM(),
        items: entry.name,
        kcal: Math.round(entry.kcal),
        p: Math.round(entry.p),
        c: Math.round(entry.c),
        f: Math.round(entry.f),
        // 重さも残す。これが無いと「200gだった」の訂正（LINE側T8）が効かない
        grams: Math.round(entry.grams || 0),
        emoji: entry.emoji,
        tint: entry.tint
      };
      log[s].status = "recorded";
      log[s].entries.push(rec);

      // 1枠に複数記録がある場合はサーバ側も合算で持つ（1枠=1行）
      var t = slotTotals(s);
      push({
        slot: slotNo(s),
        status: "recorded",
        items: log[s].entries.map(function (e) { return e.items; }).join("・"),
        kcal: t.kcal, p: t.p, c: t.c, f: t.f,
        grams: t.grams,
        source: "liff"
      });

      finishWrite(s, s + "に記録しました");
    }

    /** 「食べていない」の明示的な申告。未記録とは別の状態として保存する。 */
    function markSkipped(s) {
      log[s].status = "skipped";
      log[s].entries = [];
      push({ slot: slotNo(s), status: "skipped" });
      finishWrite(s, s + "は食べていないと記録しました");
    }

    function finishWrite(s, message) {
      renderTimeline(s);
      renderSummary(false);
      closeScreen();
      setSheet(false);
      pendingSlot = null;
      // 記録直後はリングとAIサマリーまで戻す。「反映された」が見えることが継続の動機になる。
      $("scroll").scrollTo({ top: 0, behavior: "smooth" });
      toast(message);
    }

    // --- Photo / barcode → analysis card ---
    // ------------------------------------------------------------
    // 候補リスト（履歴・よく食べるもの）
    //   ダミーではなく自分の記録から作る。ここが固定データだと、
    //   タップした瞬間に食べていないものが記録に入る。
    // ------------------------------------------------------------
    var TINTS = [
      ["#DFF3DC", "#93D18C"], ["#FFE7C2", "#FFC97A"], ["#E3EAFF", "#9DB2FF"],
      ["#FFD9CF", "#FF9E80"], ["#F0E6D8", "#D3B78E"], ["#EFEFF2", "#C7C7CC"]
    ];
    function tintOf(name) {
      var h = 0;
      for (var i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) % 997;
      return TINTS[h % TINTS.length];
    }
    function mdLabel(date) {
      var a = date.split("-");
      return Number(a[1]) + "/" + Number(a[2]);
    }

    /** 記録済みの枠を新しい順に並べる（履歴・お気に入りの共通の元データ）。 */
    function recordedEntries() {
      if (!HIST || !HIST.days) return [];
      var out = [];
      [...HIST.days].reverse().forEach(function (d) {
        (d.slots || []).forEach(function (sl) {
          if (sl.status !== "recorded" || !sl.items) return;
          out.push({
            name: sl.items, date: d.date,
            kcal: sl.kcal, p: sl.p, c: sl.c, f: sl.f, grams: sl.grams || 0,
            emoji: "🍽️", tint: tintOf(sl.items)
          });
        });
      });
      return out;
    }

    /** 最近食べたもの（同じ内容は最新の1件だけ）。 */
    function recentItems() {
      var seen = {}, out = [];
      recordedEntries().forEach(function (e) {
        if (seen[e.name]) return;
        seen[e.name] = 1;
        out.push(Object.assign({}, e, { meta: mdLabel(e.date) }));
      });
      return out.slice(0, 12);
    }

    /** よく食べるもの（記録回数の多い順）。 */
    function favItems() {
      var byName = {};
      recordedEntries().forEach(function (e) {
        if (!byName[e.name]) byName[e.name] = { e: e, n: 0 };
        byName[e.name].n++;
      });
      return Object.keys(byName)
        .map(function (k) { return Object.assign({}, byName[k].e, { meta: byName[k].n + "回" }); })
        .sort(function (a, b) { return Number(b.meta) - Number(a.meta); })
        .slice(0, 12);
    }

    /** 直近で記録がある日の内容（「昨日と同じ」用）。 */
    function lastDayEntries() {
      if (!HIST || !HIST.days) return [];
      var days = [...HIST.days].reverse();
      for (var i = 0; i < days.length; i++) {
        if (days[i].date === (HIST.today || "")) continue;
        var got = (days[i].slots || []).filter(function (sl) {
          return sl.status === "recorded" && sl.items;
        });
        if (got.length) {
          return got.map(function (sl) {
            return {
              name: sl.items, kcal: sl.kcal, p: sl.p, c: sl.c, f: sl.f,
              emoji: "🍽️", tint: tintOf(sl.items), meta: mdLabel(days[i].date)
            };
          });
        }
      }
      return [];
    }

    /** 「前回と同じ」ボタンの見出しを実データに合わせる。候補が無ければ隠す。 */
    function refreshQuick() {
      var last = lastDayEntries();
      var btn = $("repeat-btn");
      if (!last.length) { btn.hidden = true; return; }
      btn.hidden = false;
      $("quick-title").textContent = last[0].meta + " と同じもの";
      $("quick-sub").textContent = last.length === 1
        ? last[0].name + " ／ " + last[0].kcal + " kcal"
        : last[0].name + " ほか" + (last.length - 1) + "件";
    }

    // ------------------------------------------------------------
    // 写真撮影 → サーバで解析（写真／栄養成分表示ラベル）
    //   ここが本物の記録経路。端末側では縮小だけを行い、
    //   解析も換算もサーバに任せる（画面とAIで違う数値を出さないため）。
    // ------------------------------------------------------------
    var pendingMode = "meal";

    function capture(mode) {
      pendingMode = mode;
      var input = $("camera");
      input.value = "";
      input.click();
    }

    /** 長辺 maxPx に縮小して JPEG(base64) にする。原寸のまま送ると通信も関数も重い。 */
    function shrink(file, maxPx) {
      return new Promise(function (resolve, reject) {
        var img = new Image();
        var url = URL.createObjectURL(file);
        img.onload = function () {
          URL.revokeObjectURL(url);
          var r = Math.min(1, maxPx / Math.max(img.width, img.height));
          var cv = document.createElement("canvas");
          cv.width = Math.round(img.width * r);
          cv.height = Math.round(img.height * r);
          cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
          resolve(cv.toDataURL("image/jpeg", 0.82).split(",")[1]);
        };
        img.onerror = function () { URL.revokeObjectURL(url); reject(new Error("decode")); };
        img.src = url;
      });
    }

    $("camera").addEventListener("change", async function () {
      var file = this.files && this.files[0];
      if (!file) return;
      var isLabel = pendingMode === "label";
      openScreen(isLabel ? "栄養成分表示を読み取り中" : "解析中");

        });
        // 重量が読めなかったラベル（「1本あたり」等）は、比例させずそのまま1食分として扱う
        var grams = res.grams > 0 ? res.grams : 0;
        runAnalysis({
          name: res.items || (isLabel ? "商品" : "食事"),
          grams: grams,

        });

          ? "栄養成分表示を読み取れなかった。表示部分を大きく写してね"
          : "うまく解析できなかった。もう一度撮ってね");

    function runAnalysis(base, opts) {
      opts = opts || {};
      openScreen(opts.title || "解析結果");
      var body = $("screen-body");

      body.innerHTML =
        '<div class="shot" style="' + tint(base.tint) + '">' + base.emoji + "</div>" +
        '<div class="analyzing"><div class="skel"></div><div class="skel"></div><div class="skel"></div></div>';

      setTimeout(function () {
        var grams = base.grams;
        // 重量が分からない場合（ラベルに「1本あたり」しか無い等）は比例させない。
        // 分からない重さを推測して掛け算すると、記録が静かに何倍にもなる。
        var per = grams > 0
          ? { kcal: base.kcal / grams, p: base.p / grams, c: base.c / grams, f: base.f / grams }
          : null;
        var slot = pendingSlot || nextOpenSlot();

        body.innerHTML =
          '<div class="shot" style="' + tint(base.tint) + '">' + base.emoji + "</div>" +
          '<div class="result">' +
            "<div>" +
              '<div class="dish-name">' + base.name + "</div>" +
              '<div class="dish-conf">' +
                '<svg width="13" height="13" viewBox="0 0 24 24" fill="none">' +
                  '<path d="M4.5 12.5l5 5 10-11" stroke="currentColor" stroke-width="3" ' +
                  'stroke-linecap="round" stroke-linejoin="round"/></svg>AIが自動で判定しました</div>' +
            "</div>" +
            '<div class="slot-pick" id="slot-pick">' +
              SLOTS.map(function (s) {
                return '<button class="slot-chip' + (s === slot ? " on" : "") +
                  '" data-slot="' + s + '">' + s + "</button>";
              }).join("") +
            "</div>" +
            (per
              ? '<div class="card stepper">' +
                '<span class="step-l"><b>重さ</b><span>' +
                  (opts.note ? "変更できます" : "AI推定 · 変更できます") + "</span></span>" +
                '<span class="step-ctl">' +
                  '<button class="step-btn" id="minus" aria-label="減らす">−</button>' +
                  '<span class="step-val num" id="grams">' + grams + " g</span>" +
                  '<button class="step-btn" id="plus" aria-label="増やす">＋</button>' +
                "</span>" +
              "</div>"
              : "") +
            '<div class="macro-grid">' +
              '<div class="mg-cell"><span class="mg-k">KCAL</span><span class="mg-v num" id="v-kcal">0</span></div>' +
              '<div class="mg-cell"><span class="mg-k" style="color:var(--blue)">P</span><span class="mg-v num" id="v-p">0</span></div>' +
              '<div class="mg-cell"><span class="mg-k" style="color:var(--orange)">C</span><span class="mg-v num" id="v-c">0</span></div>' +
              '<div class="mg-cell"><span class="mg-k" style="color:var(--yellow)">F</span><span class="mg-v num" id="v-f">0</span></div>' +
            "</div>" +
            '<button class="save" id="save">保存</button>' +
            '<p class="hint">' +
              (opts.note || "確認は不要です。保存すればすぐ反映されます。") + "</p>" +
          "</div>";

        var chosenSlot = slot;

        function values() {
          return per
            ? { kcal: per.kcal * grams, p: per.p * grams, c: per.c * grams, f: per.f * grams }
            : { kcal: base.kcal, p: base.p, c: base.c, f: base.f };
        }
        function paint() {
          var v = values();
          if (per) {
            $("grams").textContent = grams + " g";
            $("minus").disabled = grams <= 20;
          }
          $("v-kcal").textContent = fmt(v.kcal);
          $("v-p").textContent = fmt(v.p);
          $("v-c").textContent = fmt(v.c);
          $("v-f").textContent = fmt(v.f);
        }
        paint();

        if (per) {
          $("minus").addEventListener("click", function () {
            grams = Math.max(20, grams - 20); paint();
          });
          $("plus").addEventListener("click", function () {
            grams = Math.min(2000, grams + 20); paint();
          });
        }

        $("slot-pick").addEventListener("click", function (e) {
          var btn = e.target.closest("[data-slot]");
          if (!btn) return;
          chosenSlot = btn.dataset.slot;
          Array.prototype.forEach.call(this.children, function (c) { c.classList.remove("on"); });
          btn.classList.add("on");
        });

        $("save").addEventListener("click", function () {
          var v = values();
          commit({
            name: base.name,
            kcal: v.kcal, p: v.p, c: v.c, f: v.f,
            grams: per ? grams : 0,
            emoji: base.emoji,
            tint: base.tint
          }, chosenSlot);
        });
      }, opts.delay != null ? opts.delay : 780);
    }

    // --- Manual: still no name typing. Pick a size, done. ---

        '<p class="hint">料理名の入力は不要です。<br>PFCは一般的な食事の比率から推定します。</p>';

      function paint() {

    // --- Sheet actions ---
    $("sheet").addEventListener("click", function (e) {

    // ------------------------------------------------------------
    // Boot
    // ------------------------------------------------------------
    /** サーバの枠データ（materialize 済み）を画面のモデルに移す。 */
    function adoptServerDay(data) {
      MEALS_PER_DAY = data.meals.perDay;
      SLOTS = [];
      for (var i = 1; i <= MEALS_PER_DAY; i++) SLOTS.push(i + "食目");
      log = {};
      SLOTS.forEach(function (s) { log[s] = { status: "unrecorded", entries: [] }; });

      data.meals.slots.forEach(function (sl) {
        var key = sl.slot + "食目";
        if (!log[key]) { SLOTS.push(key); log[key] = { status: "unrecorded", entries: [] }; }
        log[key].status = sl.status;
        if (sl.status === "recorded") {
          log[key].entries = [{
            time: "", items: sl.items || "記録済み",
            kcal: sl.kcal, p: sl.p, c: sl.c, f: sl.f,
            emoji: "🍽️", tint: ["#ECECEF", "#C7C7CC"]
          }];
        }
      });

      var t = data.meals.targets;
      if (t && t.kcalRest != null) {
        // kcalToday は週の過不足を反映済みの確定値（T5）。あればそれを目標にする。
        // 画面とAIで違う数字を出さないよう、計算は必ずサーバ側の値をそのまま使う。
        GOAL.kcal = t.kcalToday || t.kcalTraining || t.kcalRest;
        if (t.proteinG) GOAL.p = t.proteinG;
        ADJUST_NOTE = (t.adjustKcal ? t.adjustNote : "") || "";
      }
    }

    // ------------------------------------------------------------
    // 履歴（T11）
    //   記録＝LINE / 振り返り＝LIFF の「振り返り」側。ここでは記録させない。
    //   3値（記録済み・未記録・食べてない申告）を最後まで混ぜないのが要点。
    // ------------------------------------------------------------
    var HIST = null;   // { perDay, days:[{date,slots,totals,recorded,unrecorded,skipped}], streak }

    /** 履歴の読み込み（履歴画面と候補リストで共用。1回だけ取ればいい）。 */
    async function loadHistory() {
      if (!online) return;
      var data = await api("/liff/history?days=14", { method: "GET" });
      HIST = data.meals;
      HIST.today = data.to;
    }
    var histSel = -1;  // 選択中の日（days の添字）

    var WD = ["日", "月", "火", "水", "木", "金", "土"];
    function dateParts(s) {
      var a = s.split("-").map(Number);
      return { y: a[0], m: a[1], d: a[2], wd: new Date(a[0], a[1] - 1, a[2]).getDay() };
    }

    async function openHistory() {
      $("history").classList.add("on");
      if (HIST) renderHistory();
      else $("history-hint").textContent = "読み込み中…";

      if (!online) {
        HIST = demoHistory();
        renderHistory();
        $("history-hint").textContent = "デモデータを表示しています。実際の記録ではありません。";
        return;
      }
      try {
        await loadHistory();
        histSel = -1;
        renderHistory();
        $("history-hint").textContent =
          "平均は記録がある日だけで計算しています。記録が無い日は0kcalとして扱いません。";
      } catch (_) {
        $("history-hint").textContent = "履歴を読み込めませんでした。通信を確認して開き直してね。";
        toast("読み込めなかった");
      }
    }

    function renderHistory() {
      var days = HIST.days || [];
      if (histSel < 0 || histSel >= days.length) histSel = days.length - 1;

      $("streak-n").textContent = HIST.streak || 0;
      $("streak-t").textContent = (HIST.streak || 0) > 0
        ? "連続で記録しています。続けるほど提案の精度が上がります。"
        : "まだ連続記録がありません。1枠でも記録すると始まります。";

      var withRec = days.filter(function (d) { return d.recorded > 0; });
      $("heat-meta").textContent = withRec.length + " / " + days.length + "日 記録あり";

      renderHeat(days);
      renderBars(days);
      selectDay(histSel);
    }

    function renderHeat(days) {
      var wrap = $("heat");
      wrap.innerHTML = "";
      // 曜日の見出しは先頭7日から作って1行だけ出す（14日は必ず同じ曜日の並びになる）
      days.slice(0, 7).forEach(function (d) {
        var h = document.createElement("div");
        h.className = "heat-wd";
        h.textContent = WD[dateParts(d.date).wd];
        wrap.appendChild(h);
      });
      days.forEach(function (d, i) {
        var p = dateParts(d.date);
        var ratio = HIST.perDay ? d.recorded / HIST.perDay : 0;
        var lv = d.recorded === 0 ? 0 : Math.min(4, Math.ceil(ratio * 4));
        var box = document.createElement("button");
        box.className = "heat-box" + (lv ? " lv" + lv : "") +
          (d.recorded === 0 && d.skipped > 0 ? " skipped" : "") +
          (i === histSel ? " sel" : "");
        box.textContent = p.d;
        box.setAttribute("aria-label",
          (p.m + "月" + p.d + "日 ") +
          (d.recorded > 0 ? d.recorded + "枠 記録" : d.skipped > 0 ? "食べていない申告" : "記録なし"));
        box.addEventListener("click", function () { histSel = i; renderHistory(); });
        wrap.appendChild(box);
      });
    }

    function renderBars(days) {
      var wrap = $("bars");
      var xs = $("bar-xs");
      wrap.innerHTML = "";
      xs.innerHTML = "";
      var goal = GOAL.kcal || 2000;
      var maxKcal = days.reduce(function (a, d) { return Math.max(a, d.totals.kcal); }, 0);
      var top = Math.max(goal, maxKcal) * 1.12;

      days.forEach(function (d, i) {
        var p = dateParts(d.date);
        var col = document.createElement("div");
        col.className = "bar-col";
        if (d.recorded > 0) {
          var bar = document.createElement("div");
          bar.className = "bar-fill" + (d.totals.kcal > goal ? " over" : "");
          bar.style.height = Math.max(2, (d.totals.kcal / top) * 100) + "%";
          bar.title = d.totals.kcal + " kcal";
          col.appendChild(bar);
        } else {
          // 記録が無い日は棒を出さない（0kcalに見せない）
          var none = document.createElement("div");
          none.className = "bar-none";
          col.appendChild(none);
        }
        col.addEventListener("click", function () { histSel = i; renderHistory(); });
        wrap.appendChild(col);

        var x = document.createElement("div");
        x.className = "bar-x num";
        x.textContent = i % 2 === 0 ? p.d : "";
        xs.appendChild(x);
      });

      // 目標ライン。棒と同じ高さ基準（.bars の高さ）で置く
      var line = document.createElement("div");
      line.className = "goal-line";
      line.style.bottom = (goal / top) * 100 + "%";
      line.innerHTML = '<span class="goal-tag num">目標 ' + goal.toLocaleString("en-US") + "</span>";
      wrap.appendChild(line);
    }

    function selectDay(i) {
      var d = HIST.days[i];
      if (!d) return;
      var p = dateParts(d.date);
      $("day-title").textContent = p.m + "月" + p.d + "日（" + WD[p.wd] + "）";
      var parts = [];
      if (d.recorded > 0) parts.push(d.recorded + "枠 記録");
      if (d.skipped > 0) parts.push(d.skipped + "枠 食べてない");
      if (d.unrecorded > 0) parts.push(d.unrecorded + "枠 未記録");
      $("day-meta").textContent = parts.join(" ・ ");

      // 記録が1枠も無い日に 0kcal と出すと「何も食べていない」と読めてしまう。
      // 分からないものは分からないまま「—」で出す。
      var t = d.totals;
      var has = d.recorded > 0;
      $("day-tot").innerHTML = [
        ["kcal", has ? t.kcal.toLocaleString("en-US") : "—"],
        ["P", has ? t.p + "g" : "—"],
        ["C", has ? t.c + "g" : "—"],
        ["F", has ? t.f + "g" : "—"]
      ].map(function (r) {
        return '<div class="totcell"><div class="k">' + r[0] + '</div><div class="v num">' + r[1] + "</div></div>";
      }).join("");

      var wrap = $("daylog");
      wrap.innerHTML = "";
      d.slots.forEach(function (sl) {
        var row = document.createElement("div");
        var muted = sl.status !== "recorded";
        row.className = "card dl-row" + (muted ? " muted" : "");
        var label = sl.status === "recorded"
          ? (sl.items || "記録済み")
          : (sl.status === "skipped" ? "食べていない" : "未記録");
        row.innerHTML =
          '<span class="dl-slot">' + sl.slot + "食目</span>" +
          '<span class="dl-body">' +
            '<span class="dl-items">' + esc(label) + "</span>" +
            (sl.status === "recorded"
              ? '<span class="dl-macro num">P ' + sl.p + " ・ C " + sl.c + " ・ F " + sl.f + "</span>"
              : "") +
          "</span>" +
          (sl.status === "recorded"
            ? '<span class="dl-kcal num">' + sl.kcal.toLocaleString("en-US") + "</span>"
            : "");
        wrap.appendChild(row);
      });
    }

    /** 記録内容はユーザー入力・AI出力なので、そのまま innerHTML に載せない。 */
    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
      });
    }

    /** LINE外プレビュー用のダミー履歴。実データと取り違えないよう画面にも明示する。 */
    function demoHistory() {
      var per = MEALS_PER_DAY || 4;
      var days = [];
      var base = new Date();
      for (var i = 13; i >= 0; i--) {
        var dt = new Date(base.getFullYear(), base.getMonth(), base.getDate() - i);
        var date = dt.getFullYear() + "-" +
          String(dt.getMonth() + 1).padStart(2, "0") + "-" + String(dt.getDate()).padStart(2, "0");
        // 3日に1度は記録が抜け、たまに「食べてない」申告がある、くらいの散らばり
        var rec = i === 4 ? 0 : Math.max(1, per - (i % 3));
        var skip = i === 4 ? 1 : (i % 5 === 0 ? 1 : 0);
        var slots = [];
        for (var s = 1; s <= per; s++) {
          if (s <= rec) {
            slots.push({
              slot: s, status: "recorded",
              items: ["鶏むねと白米", "オートミールとプロテイン", "サーモン丼", "卵かけご飯と味噌汁"][(s + i) % 4],
              kcal: 420 + ((i * 37 + s * 53) % 260), p: 28 + (s * 3 + i) % 14,
              c: 45 + (i * 5 + s) % 30, f: 9 + (i + s) % 8, grams: null
            });
          } else {
            slots.push({
              slot: s, status: s === per && skip ? "skipped" : "unrecorded",
              items: null, kcal: 0, p: 0, c: 0, f: 0, grams: null
            });
          }
        }
        var tot = slots.reduce(function (a, sl) {
          if (sl.status !== "recorded") return a;
          return { kcal: a.kcal + sl.kcal, p: a.p + sl.p, c: a.c + sl.c, f: a.f + sl.f };
        }, { kcal: 0, p: 0, c: 0, f: 0 });
        days.push({
          date: date, slots: slots, totals: tot,
          recorded: rec,
          skipped: slots.filter(function (x) { return x.status === "skipped"; }).length,
          unrecorded: slots.filter(function (x) { return x.status === "unrecorded"; }).length
        });
      }
      return { perDay: per, days: days, streak: 4 };
    }

    $("history-btn").addEventListener("click", openHistory);
    $("history-back").addEventListener("click", function () {
      $("history").classList.remove("on");
    });

    // ------------------------------------------------------------
    // Boot
    // ------------------------------------------------------------
    (async function boot() {
      // 起動時は空（全枠が未記録）で描く。読み込みが終わるまで、
      // 記録していないものを一瞬でも表示しないため。
      $("home-hint").textContent = "読み込み中…";
      renderTimeline(null);
      renderSummary(true);

      online = await connect();

      if (!online) {
        // LINE の外で開いた場合だけ、デモだと明示したうえでダミーを見せる
        seedDemo();
        HIST = demoHistory();        // 候補リスト（履歴・お気に入り）もデモで動かす
        HIST.today = HIST.days[HIST.days.length - 1].date;
        refreshQuick();
        renderTimeline(null);
        renderSummary(false);
        $("home-hint").textContent = "デモデータを表示しています。実際の記録ではありません。";
        return;
      }

      try {
        var data = await api("/liff/today", { method: "GET" });
        adoptServerDay(data);
        renderTimeline(null);
        renderSummary(false);
        $("home-hint").innerHTML =
          "写真を撮るだけで記録できます。<br>加工食品は栄養成分表示を撮ると正確だよ。";
        // 履歴・お気に入り・「前回と同じ」は自分の記録から作るので先に読んでおく
        loadHistory().then(refreshQuick);
      } catch (_) {
        // 失敗してもデモには戻さない。空のまま「読めなかった」と正直に出す。
        $("home-hint").textContent = "記録を読み込めませんでした。通信を確認して開き直してね。";
        toast("読み込めなかった");
      }
    })();
  })();
</script>
