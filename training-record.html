<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CLEW トレーニング記録</title>

<style>
  /* ---------------------------------------------------------------
     Tokens — 食事記録(meal-record.html)と同一の Apple システムカラー
  --------------------------------------------------------------- */
  :root {
    --bg: #ffffff;
    --card: #f2f2f7;
    --card-elevated: #ffffff;
    --sheet: rgba(249, 249, 251, 0.82);
    --header: rgba(255, 255, 255, 0.72);
    --separator: #e5e5ea;
    --label: #000000;
    --label-2: rgba(60, 60, 67, 0.6);
    --label-3: rgba(60, 60, 67, 0.3);
    --fill: rgba(120, 120, 128, 0.12);
    --track: rgba(120, 120, 128, 0.16);

    --blue: #007aff;
    --orange: #ff9500;
    --yellow: #ffcc00;
    --green: #34c759;
    --red: #ff3b30;

    --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow-sheet: 0 -1px 0 rgba(0, 0, 0, 0.06), 0 -12px 40px rgba(0, 0, 0, 0.14);

    --r-card: 18px;
    --ease: cubic-bezier(0.32, 0.72, 0, 1);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --card: #1c1c1e;
      --card-elevated: #1c1c1e;
      --sheet: rgba(30, 30, 32, 0.82);
      --header: rgba(0, 0, 0, 0.62);
      --separator: #38383a;
      --label: #ffffff;
      --label-2: rgba(235, 235, 245, 0.6);
      --label-3: rgba(235, 235, 245, 0.3);
      --fill: rgba(120, 120, 128, 0.24);
      --track: rgba(120, 120, 128, 0.28);
      --blue: #0a84ff;
      --orange: #ff9f0a;
      --yellow: #ffd60a;
      --green: #30d158;
      --red: #ff453a;
      --shadow-card: none;
      --shadow-sheet: 0 -1px 0 rgba(255, 255, 255, 0.08), 0 -12px 40px rgba(0, 0, 0, 0.6);
    }
  }

  :root[data-theme="dark"] {
    --bg: #000000;
    --card: #1c1c1e;
    --card-elevated: #1c1c1e;
    --sheet: rgba(30, 30, 32, 0.82);
    --header: rgba(0, 0, 0, 0.62);
    --separator: #38383a;
    --label: #ffffff;
    --label-2: rgba(235, 235, 245, 0.6);
    --label-3: rgba(235, 235, 245, 0.3);
    --fill: rgba(120, 120, 128, 0.24);
    --track: rgba(120, 120, 128, 0.28);
    --blue: #0a84ff;
    --orange: #ff9f0a;
    --yellow: #ffd60a;
    --green: #30d158;
    --red: #ff453a;
    --shadow-card: none;
    --shadow-sheet: 0 -1px 0 rgba(255, 255, 255, 0.08), 0 -12px 40px rgba(0, 0, 0, 0.6);
  }

  :root[data-theme="light"] {
    --bg: #ffffff;
    --card: #f2f2f7;
    --card-elevated: #ffffff;
    --sheet: rgba(249, 249, 251, 0.82);
    --header: rgba(255, 255, 255, 0.72);
    --separator: #e5e5ea;
    --label: #000000;
    --label-2: rgba(60, 60, 67, 0.6);
    --label-3: rgba(60, 60, 67, 0.3);
    --fill: rgba(120, 120, 128, 0.12);
    --track: rgba(120, 120, 128, 0.16);
    --blue: #007aff;
    --orange: #ff9500;
    --yellow: #ffcc00;
    --green: #34c759;
    --red: #ff3b30;
    --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow-sheet: 0 -1px 0 rgba(0, 0, 0, 0.06), 0 -12px 40px rgba(0, 0, 0, 0.14);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--label);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Hiragino Sans",
      "Hiragino Kaku Gothic ProN", "Yu Gothic", system-ui, sans-serif;
    font-size: 17px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    font-variant-numeric: tabular-nums;
  }

  button {
    font: inherit;
    color: inherit;
    background: none;
    border: 0;
    padding: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  :focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; border-radius: 6px; }
  .num { font-variant-numeric: tabular-nums; }

  .app {
    position: relative;
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    /* モバイルでも固定高のコンテナにする。開始ボタン・シート・各画面は絶対配置なので、
       body スクロールにすると画面外へ流れてしまう。スクロールは .scroll だけが担う。 */
    height: 100vh;
    height: 100dvh;
    background: var(--bg);
    overflow: hidden;
    overflow: clip;
  }

  @media (min-width: 480px) {
    body { background: color-mix(in srgb, var(--label) 6%, var(--bg)); padding: 24px 0; }
    .app {
      min-height: 812px;
      height: 812px;
      border-radius: 42px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.22), 0 0 0 1px var(--separator);
      overflow: hidden;
      overflow: clip;
    }
  }

  /* ---------------- Header ---------------- */
  .header {
    position: sticky;
    top: 0;
    z-index: 30;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 20px 10px;
    background: var(--header);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 0.5px solid var(--separator);
  }
  .header h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
  .header .sub { margin: 2px 0 0; font-size: 13px; color: var(--label-2); }

  .pill {
    flex: none;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 20px;
    background: color-mix(in srgb, var(--blue) 12%, transparent);
    color: var(--blue);
  }

  .scroll {
    height: calc(100% - 66px);
    overflow-y: auto;
    overscroll-behavior: contain;
    padding: 16px 20px calc(110px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card { background: var(--card); border-radius: var(--r-card); box-shadow: var(--shadow-card); }

  .sec-head { display: flex; align-items: baseline; justify-content: space-between; padding: 6px 4px 0; }
  .sec-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .sec-meta { font-size: 13px; color: var(--label-2); }

  /* ---------------- 種目リスト（ホーム） ---------------- */
  .ex-row { display: flex; align-items: center; gap: 13px; padding: 13px 14px; width: 100%; text-align: left; }
  .ex-idx {
    flex: none;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--fill);
    color: var(--label-2);
    font-size: 13px; font-weight: 700;
    display: grid; place-items: center;
  }
  .ex-row.done .ex-idx { background: var(--green); color: #fff; }
  .ex-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .ex-name { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .ex-meta { font-size: 12px; color: var(--label-2); }
  .ex-prev { flex: none; text-align: right; font-size: 12px; color: var(--label-3); line-height: 1.35; }

  .start {
    position: absolute;
    left: 20px; right: 20px;
    bottom: calc(22px + env(safe-area-inset-bottom));
    z-index: 40;
    padding: 17px;
    border-radius: 16px;
    background: var(--blue);
    color: #fff;
    font-size: 17px; font-weight: 700; letter-spacing: -0.01em;
    box-shadow: 0 6px 20px color-mix(in srgb, var(--blue) 34%, transparent);
    transition: transform 0.2s var(--ease);
  }
  .start:active { transform: scale(0.98); }

  /* ---------------- セッション画面 ---------------- */
  .screen {
    position: absolute;
    inset: 0;
    z-index: 70;
    background: var(--bg);
    transform: translateY(100%);
    transition: transform 0.42s var(--ease);
    display: flex;
    flex-direction: column;
  }
  .screen.on { transform: translateY(0); }

  .s-top {
    flex: none;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 14px 18px 10px;
  }
  .s-abort { justify-self: start; font-size: 15px; font-weight: 600; color: var(--red); }
  .s-timer { text-align: center; }
  .s-timer .k { font-size: 10px; color: var(--label-3); letter-spacing: 0.06em; font-weight: 600; }
  .s-timer .v { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .s-progress { justify-self: end; font-size: 13px; color: var(--label-2); font-weight: 600; }

  .s-body {
    flex: 1;
    overflow-y: auto;
    padding: 6px 20px calc(20px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
  }

  .s-title { text-align: center; padding: 10px 0 4px; }
  .s-name { font-size: 27px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.15; text-wrap: balance; }
  .s-set { font-size: 15px; color: var(--label-2); margin-top: 5px; font-weight: 600; }
  .s-next { font-size: 12px; color: var(--label-3); margin-top: 3px; }

  /* 前回の実績（Strong的な参照） */
  .prev-ref {
    margin: 12px 0 0;
    padding: 10px 14px;
    border-radius: 12px;
    background: var(--fill);
    font-size: 13px;
    color: var(--label-2);
    text-align: center;
  }
  .prev-ref b { color: var(--label); font-weight: 700; }

  /* 大きいステッパー（添付画像の操作性） */
  .steppers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 18px 0 4px;
  }
  .st { display: flex; flex-direction: column; align-items: center; gap: 8px; }

  .st-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: color-mix(in srgb, var(--blue) 13%, transparent);
    color: var(--blue);
    display: grid; place-items: center;
    transition: transform 0.16s var(--ease), background 0.16s;
  }
  .st-btn:active { transform: scale(0.9); background: color-mix(in srgb, var(--blue) 24%, transparent); }
  .st-btn[disabled] { color: var(--label-3); background: var(--fill); }

  .st-val { font-size: 46px; font-weight: 700; letter-spacing: -0.04em; line-height: 1; }
  .st-unit { font-size: 12px; color: var(--label-2); font-weight: 600; letter-spacing: 0.04em; }

  /* 完了済みセット */
  .sets { display: flex; flex-direction: column; gap: 6px; margin-top: 16px; }
  .set-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 13px;
    border-radius: 11px;
    background: var(--card);
    font-size: 14px;
  }
  .set-n { flex: none; width: 22px; height: 22px; border-radius: 50%; background: var(--green); color: #fff;
           font-size: 11px; font-weight: 700; display: grid; place-items: center; }
  .set-w { flex: 1; font-weight: 600; letter-spacing: -0.01em; }
  .set-rir { flex: none; font-size: 11px; font-weight: 600; color: var(--label-2);
             background: var(--fill); padding: 3px 8px; border-radius: 6px; }

  .s-foot { flex: none; padding: 12px 20px calc(18px + env(safe-area-inset-bottom)); }
  .done-btn {
    width: 100%;
    padding: 17px;
    border-radius: 16px;
    background: var(--blue);
    color: #fff;
    font-size: 17px; font-weight: 700; letter-spacing: -0.01em;
    box-shadow: 0 6px 20px color-mix(in srgb, var(--blue) 34%, transparent);
    transition: transform 0.2s var(--ease);
  }
  .done-btn:active { transform: scale(0.98); }

  /* ---------------- RIR シート（あと何回できそう？） ---------------- */
  .scrim {
    position: absolute; inset: 0; z-index: 80;
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s var(--ease);
  }
  .scrim.on { opacity: 1; pointer-events: auto; }

  .sheet {
    position: absolute; left: 8px; right: 8px; bottom: 0; z-index: 90;
    transform: translateY(115%);
    transition: transform 0.42s var(--ease);
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
  }
  .sheet.on { transform: translateY(0); }

  .sheet-inner {
    background: var(--sheet);
    backdrop-filter: saturate(180%) blur(24px);
    -webkit-backdrop-filter: saturate(180%) blur(24px);
    border-radius: 20px;
    box-shadow: var(--shadow-sheet);
    padding: 20px 16px 16px;
  }

  .rir-q { text-align: center; font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .rir-sub { text-align: center; font-size: 12px; color: var(--label-2); margin-top: 5px; }

  .rir-opts { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
  .rir-opt {
    display: flex; align-items: center; gap: 12px;
    width: 100%;
    padding: 15px 16px;
    border-radius: 13px;
    background: var(--card-elevated);
    box-shadow: 0 0 0 0.5px var(--separator);
    text-align: left;
    transition: transform 0.16s var(--ease), background 0.16s;
  }
  .rir-opt:active { transform: scale(0.985); background: var(--fill); }
  .rir-badge {
    flex: none; width: 34px; height: 34px; border-radius: 50%;
    display: grid; place-items: center;
    font-size: 14px; font-weight: 700; color: #fff;
  }
  .rir-t { flex: 1; }
  .rir-t b { display: block; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .rir-t span { font-size: 12px; color: var(--label-2); }

  /* ---------------- 休憩タイマー ---------------- */
  .rest { text-align: center; padding: 6px 0 2px; }
  .rest-k { font-size: 11px; color: var(--label-2); font-weight: 600; letter-spacing: 0.06em; }
  .rest-v { font-size: 52px; font-weight: 700; letter-spacing: -0.04em; line-height: 1.05; margin-top: 2px; }
  .rest-note {
    margin-top: 12px; padding: 12px 14px; border-radius: 13px;
    background: color-mix(in srgb, var(--blue) 10%, transparent);
    font-size: 14px; color: var(--label); text-align: center; line-height: 1.5;
  }
  .rest-note b { color: var(--blue); font-weight: 700; }
  .rest-actions { display: flex; gap: 8px; margin-top: 14px; }
  .ghost-btn {
    flex: 1; padding: 14px; border-radius: 13px;
    background: var(--card-elevated); box-shadow: 0 0 0 0.5px var(--separator);
    font-size: 16px; font-weight: 600;
  }
  .ghost-btn:active { background: var(--fill); }
  .primary-btn {
    flex: 1; padding: 14px; border-radius: 13px;
    background: var(--blue); color: #fff; font-size: 16px; font-weight: 700;
  }
  .primary-btn:active { opacity: 0.9; }

  /* ---------------- サマリー ---------------- */
  .sum-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: var(--separator);
    border-radius: var(--r-card); overflow: hidden;
  }
  .sum-cell { background: var(--card); padding: 15px 8px; text-align: center; display: flex; flex-direction: column; gap: 3px; }
  .sum-k { font-size: 11px; color: var(--label-2); font-weight: 600; letter-spacing: 0.03em; }
  .sum-v { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .sum-u { font-size: 10px; color: var(--label-3); }

  .prog-row {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 14px;
  }
  .prog-name { flex: 1; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .prog-move { flex: none; font-size: 14px; font-weight: 700; }
  .up { color: var(--green); }
  .keep { color: var(--label-2); }
  .down { color: var(--orange); }

  .hint { font-size: 12px; color: var(--label-3); text-align: center; padding: 2px 12px; line-height: 1.5; }

  .toast {
    position: absolute; left: 50%; bottom: calc(100px + env(safe-area-inset-bottom));
    z-index: 95;
    transform: translate(-50%, 14px);
    background: rgba(28, 28, 30, 0.92); color: #fff;
    padding: 11px 18px; border-radius: 30px;
    font-size: 14px; font-weight: 600;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s var(--ease), transform 0.3s var(--ease);
    backdrop-filter: blur(14px); white-space: nowrap;
  }
  .toast.on { opacity: 1; transform: translate(-50%, 0); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>

<div class="app">
  <header class="header">
    <div>
      <h1 id="day-part">胸</h1>
      <p class="sub" id="day-sub">7月20日 月曜日 ・ 1回目</p>
    </div>
    <span class="pill" id="day-pill">全3種目</span>
  </header>

  <div class="scroll" id="home-scroll">
    <div class="sec-head">
      <h2 class="sec-title">今日の種目</h2>
      <span class="sec-meta" id="home-meta">前回の記録つき</span>
    </div>
    <div id="ex-list" style="display:flex;flex-direction:column;gap:8px"></div>
    <p class="hint" id="home-hint">セットごとに重量と回数を記録します。<br>次の重量は記録から自動で決まります。</p>
  </div>

  <button class="start" id="start-btn">トレーニングを開始</button>

  <!-- ============ セッション画面 ============ -->
  <section class="screen" id="session" role="dialog" aria-label="セット記録">
    <div class="s-top">
      <button class="s-abort" id="abort">中止</button>
      <div class="s-timer">
        <div class="k">経過時間</div>
        <div class="v num" id="elapsed">00:00</div>
      </div>
      <div class="s-progress num" id="ex-progress">1/3</div>
    </div>

    <div class="s-body">
      <div class="s-title">
        <div class="s-name" id="cur-name">ベンチプレス</div>
        <div class="s-set num" id="cur-set">1 / 3 セット目</div>
        <div class="s-next" id="cur-next">次: インクラインプレス</div>
      </div>

      <div class="prev-ref" id="prev-ref"></div>

      <div class="steppers">
        <div class="st">
          <button class="st-btn" id="w-up" aria-label="重量を増やす">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" />
            </svg>
          </button>
          <div class="st-val num" id="w-val">45</div>
          <button class="st-btn" id="w-down" aria-label="重量を減らす">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M5 12h14" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" />
            </svg>
          </button>
          <div class="st-unit">kg</div>
        </div>

        <div class="st">
          <button class="st-btn" id="r-up" aria-label="回数を増やす">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" />
            </svg>
          </button>
          <div class="st-val num" id="r-val">10</div>
          <button class="st-btn" id="r-down" aria-label="回数を減らす">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M5 12h14" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" />
            </svg>
          </button>
          <div class="st-unit">reps</div>
        </div>
      </div>

      <div class="sets" id="done-sets"></div>
    </div>

    <div class="s-foot">
      <button class="done-btn" id="set-done">セット完了</button>
    </div>
  </section>

  <!-- ============ サマリー画面 ============ -->
  <section class="screen" id="summary" role="dialog" aria-label="サマリー">
    <div class="s-top">
      <span></span>
      <div class="s-timer"><div class="k">トレーニング完了</div><div class="v num" id="sum-time">00:00</div></div>
      <span></span>
    </div>
    <div class="s-body" style="gap:12px">
      <div class="sum-grid">
        <div class="sum-cell">
          <span class="sum-k">総ボリューム</span>
          <span class="sum-v num" id="sum-vol">0</span><span class="sum-u">kg</span>
        </div>
        <div class="sum-cell">
          <span class="sum-k">セット</span>
          <span class="sum-v num" id="sum-sets">0</span><span class="sum-u">本</span>
        </div>
        <div class="sum-cell">
          <span class="sum-k">総レップ</span>
          <span class="sum-v num" id="sum-reps">0</span><span class="sum-u">回</span>
        </div>
      </div>

      <div class="sec-head"><h2 class="sec-title">次回の重量</h2></div>
      <div id="prog-list" style="display:flex;flex-direction:column;gap:8px"></div>
      <p class="hint">「あと何回できそう？」の答えから、次回の開始重量を決めています。</p>
    </div>
    <div class="s-foot">
      <button class="done-btn" id="close-summary">閉じる</button>
    </div>
  </section>

  <!-- ============ RIR / 休憩シート ============ -->
  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet" role="dialog" aria-label="あと何回できそう">
    <div class="sheet-inner" id="sheet-inner"></div>
  </div>

  <div class="toast" id="toast"><span id="toast-text"></span></div>
</div>

<!-- LIFF SDK。LIFF外（普通のブラウザ・プレビュー）では読み込まれず、自動でデモ動作になる。 -->
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
  (function () {
    "use strict";

    function $(id) { return document.getElementById(id); }

    // ------------------------------------------------------------
    // 接続設定（LIFF に載せるときはここだけ埋める）
    // ------------------------------------------------------------
    var LIFF_ID = "2010429232-bCNjFfOY";
    var API_BASE = "https://nirneeiegkarqtyxbkop.supabase.co/functions/v1/line-webhook";

    var online = false;
    var idToken = null;

    async function api(path, options) {
      var res = await fetch(API_BASE + path, Object.assign({
        headers: {
          "content-type": "application/json",
          "authorization": "Bearer " + idToken,
        },
      }, options || {}));
      if (!res.ok) throw new Error("api " + path + " -> " + res.status);
      return res.json();
    }

    async function connect() {
      if (typeof liff === "undefined" || !LIFF_ID) return false;
      try {
        await liff.init({ liffId: LIFF_ID });
        // LINE の外（普通のブラウザ）ではログインへ飛ばさずデモのままにする。
        // 飛ばすと動作確認もプレビューもできなくなるため。
        if (!liff.isInClient() && !liff.isLoggedIn()) return false;
        if (!liff.isLoggedIn()) { liff.login(); return false; }
        idToken = liff.getIDToken();
        return !!idToken;
      } catch (_) {
        return false;
      }
    }

    // ==========================================================
    // 3層のデータ構造（サーバ側の設計をそのまま持ち込む）
    //   PLAN        … 計画。手動でしか変わらない（weekly_cycle 相当）
    //   progression … 各種目の次回推奨開始重量。ルールで自動更新
    //   logs        … 実績の生ログ（exercise_logs 相当）
    // ==========================================================
    var PLAN = {
      part: "胸",
      cycleNo: 1,
      exercises: [
        { name: "ベンチプレス", sets: 3, targetReps: 10, step: 2.5 },
        { name: "インクラインプレス", sets: 3, targetReps: 10, step: 2.5 },
        { name: "チェストフライ", sets: 3, targetReps: 12, step: 1.25 }
      ]
    };

    // 前回の実績（progression_state に相当。実際はサーバから受け取る）
    var progression = {
      "ベンチプレス": { weight: 45, lastReps: 10, lastRir: 2 },
      "インクラインプレス": { weight: 30, lastReps: 10, lastRir: 1 },
      "チェストフライ": { weight: 15, lastReps: 12, lastRir: 3 }
    };

    var logs = []; // { exercise, setNo, weight, reps, rir }

    // ==========================================================
    // 計算ルール（純粋関数。AIには一切計算させない）
    // ==========================================================

    /**
     * 次セットの重量。RIR（あと何回できそうか）で判定する。
     *   RIR 3以上 … 軽すぎる → 上げる
     *   RIR 0 かつ 目標レップ未達 … 重すぎる → 下げる
     *   RIR 1〜2 … 狙いどおり → 据え置き
     * セット間のその場調整であり、週をまたぐ進行（nextSessionWeight）とは別物。
     */
    function nextSetWeight(weight, reps, targetReps, rir, step) {
      if (rir >= 3) return weight + step;
      if (rir === 0 && reps < targetReps) return Math.max(step, weight - step);
      return weight;
    }

    /**
     * 次回セッションの開始重量（Progressive Overload）。
     * 全セットが目標レップ以上、かつ余力を残せていた（RIR<=2）ときだけ上げる。
     * 1セットでも潰れていたら据え置き。ここを甘くすると伸びが止まる。
     */
    function nextSessionWeight(sets, targetReps, step) {
      if (sets.length === 0) return null;
      var base = sets[sets.length - 1].weight;
      var allHit = sets.every(function (s) { return s.reps >= targetReps && s.rir <= 2; });
      var anyFail = sets.some(function (s) { return s.rir === 0 && s.reps < targetReps; });
      if (allHit) return base + step;
      if (anyFail) return Math.max(step, base - step);
      return base;
    }

    /** 推定1RM（Epley）。RIRぶんを実施レップに足して真の限界から逆算する。 */
    function estimate1RM(weight, reps, rir) {
      return weight * (1 + (reps + rir) / 30);
    }

    function volumeOf(rows) {
      return rows.reduce(function (a, s) { return a + s.weight * s.reps; }, 0);
    }

    // RIR の選択肢（自由入力させない。ジムで片手で押せることを優先）
    var RIR_OPTIONS = [
      { rir: 0, label: "もう限界", desc: "これ以上は上がらなかった", color: "var(--red)" },
      { rir: 1, label: "あと1回", desc: "ギリギリ1回できそう", color: "var(--orange)" },
      { rir: 2, label: "あと2回", desc: "狙いどおりの重さ", color: "var(--green)" },
      { rir: 3, label: "あと3回以上", desc: "軽い。次は重くできる", color: "var(--blue)" }
    ];

    // ==========================================================
    // 状態
    // ==========================================================
    var exIdx = 0;
    var setNo = 1;
    var weight = 0;
    var reps = 0;
    var startedAt = null;
    var tickTimer = null;
    var restTimer = null;

    function curEx() { return PLAN.exercises[exIdx]; }
    function setsOf(name) { return logs.filter(function (l) { return l.exercise === name; }); }

    function fmtClock(sec) {
      var m = Math.floor(sec / 60), s = sec % 60;
      return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
    }
    function fmtKg(v) { return (Math.round(v * 100) / 100).toString(); }

    // ==========================================================
    // ホーム
    // ==========================================================
    (function renderHeader() {
      var d = new Date();
      var w = ["日", "月", "火", "水", "木", "金", "土"][d.getDay()];
      $("day-part").textContent = PLAN.part;
      $("day-sub").textContent =
        (d.getMonth() + 1) + "月" + d.getDate() + "日 " + w + "曜日 ・ " + PLAN.cycleNo + "回目";
      $("day-pill").textContent = "全" + PLAN.exercises.length + "種目";
    })();

    function renderHome() {
      var wrap = $("ex-list");
      wrap.innerHTML = "";
      PLAN.exercises.forEach(function (e, i) {
        var p = progression[e.name];
        var done = setsOf(e.name).length >= e.sets;
        var row = document.createElement("div");
        row.className = "card ex-row" + (done ? " done" : "");
        row.innerHTML =
          '<span class="ex-idx">' + (done ? "✓" : i + 1) + "</span>" +
          '<span class="ex-body">' +
            '<span class="ex-name">' + e.name + "</span>" +
            '<span class="ex-meta num">' + e.sets + "セット × " + e.targetReps + "回</span>" +
          "</span>" +
          '<span class="ex-prev num">前回<br>' + fmtKg(p.weight) + "kg × " + p.lastReps + "</span>";
        wrap.appendChild(row);
      });
    }

    // ==========================================================
    // セッション
    // ==========================================================
    function openSession() {
      exIdx = 0; setNo = 1; logs = [];
      startedAt = Date.now();
      tickTimer = setInterval(tick, 1000);
      loadCurrent();
      $("session").classList.add("on");
    }

    function tick() {
      var sec = Math.floor((Date.now() - startedAt) / 1000);
      $("elapsed").textContent = fmtClock(sec);
    }

    function loadCurrent() {
      var e = curEx();
      var p = progression[e.name];
      var mine = setsOf(e.name);

      // 開始重量＝前回の推奨。2セット目以降は直前セットの判定結果を引き継ぐ
      weight = mine.length ? mine[mine.length - 1].nextWeight : p.weight;
      reps = e.targetReps;

      $("cur-name").textContent = e.name;
      $("cur-set").textContent = setNo + " / " + e.sets + " セット目";
      var nx = PLAN.exercises[exIdx + 1];
      $("cur-next").textContent = nx ? "次: " + nx.name : "これが最後の種目";
      $("ex-progress").textContent = (exIdx + 1) + "/" + PLAN.exercises.length;

      $("prev-ref").innerHTML = "前回 <b>" + fmtKg(p.weight) + "kg × " + p.lastReps +
        "回</b>（あと" + p.lastRir + "回）";

      paint();
      renderDoneSets();
    }

    function paint() {
      $("w-val").textContent = fmtKg(weight);
      $("r-val").textContent = reps;
      $("w-down").disabled = weight <= curEx().step;
      $("r-down").disabled = reps <= 1;
    }

    function renderDoneSets() {
      var wrap = $("done-sets");
      wrap.innerHTML = "";
      setsOf(curEx().name).forEach(function (s, i) {
        var row = document.createElement("div");
        row.className = "set-row";
        var opt = RIR_OPTIONS.find(function (o) { return o.rir === s.rir; });
        row.innerHTML =
          '<span class="set-n">' + (i + 1) + "</span>" +
          '<span class="set-w num">' + fmtKg(s.weight) + "kg × " + s.reps + "回</span>" +
          '<span class="set-rir">' + (opt ? opt.label : "") + "</span>";
        wrap.appendChild(row);
      });
    }

    $("w-up").addEventListener("click", function () { weight += curEx().step; paint(); });
    $("w-down").addEventListener("click", function () {
      weight = Math.max(curEx().step, weight - curEx().step); paint();
    });
    $("r-up").addEventListener("click", function () { reps = Math.min(50, reps + 1); paint(); });
    $("r-down").addEventListener("click", function () { reps = Math.max(1, reps - 1); paint(); });

    $("start-btn").addEventListener("click", openSession);
    $("abort").addEventListener("click", function () {
      clearInterval(tickTimer);
      tickTimer = null;
      closeSheet(); // 休憩タイマーもここで止まる
      $("session").classList.remove("on");
      renderHome();
    });

    // ---- セット完了 → RIR を聞く ----
    $("set-done").addEventListener("click", askRir);

    function askRir() {
      var e = curEx();
      $("sheet-inner").innerHTML =
        '<div class="rir-q">あと何回できそう？</div>' +
        '<div class="rir-sub">' + fmtKg(weight) + "kg × " + reps + "回 のあと</div>" +
        '<div class="rir-opts">' +
          RIR_OPTIONS.map(function (o) {
            return '<button class="rir-opt" data-rir="' + o.rir + '">' +
              '<span class="rir-badge" style="background:' + o.color + '">' +
              (o.rir === 3 ? "3+" : o.rir) + "</span>" +
              '<span class="rir-t"><b>' + o.label + "</b><span>" + o.desc + "</span></span>" +
              "</button>";
          }).join("") +
        "</div>";

      $("sheet-inner").querySelector(".rir-opts").addEventListener("click", function (ev) {
        var btn = ev.target.closest("[data-rir]");
        if (btn) commitSet(Number(btn.dataset.rir));
      });

      openSheet();
    }

    function commitSet(rir) {
      var e = curEx();
      var next = nextSetWeight(weight, reps, e.targetReps, rir, e.step);
      logs.push({
        exercise: e.name, setNo: setNo, weight: weight, reps: reps, rir: rir, nextWeight: next
      });

      var isLastSet = setNo >= e.sets;
      var isLastEx = exIdx >= PLAN.exercises.length - 1;

      if (isLastSet && isLastEx) { closeSheet(); finish(); return; }
      showRest(next, rir, isLastSet);
    }

    // ---- 休憩タイマー＋次セットの提案 ----
    function showRest(next, rir, isLastSet) {
      var e = curEx();
      var moved = next !== weight;
      var msg = moved
        ? (next > weight
          ? "余力があったので、次は <b>" + fmtKg(next) + "kg</b> に上げるよ。"
          : "重すぎたので、次は <b>" + fmtKg(next) + "kg</b> に下げるよ。")
        : "この重さが狙いどおり。次も <b>" + fmtKg(next) + "kg</b> でいこう。";

      var label = isLastSet
        ? (PLAN.exercises[exIdx + 1] ? "次の種目へ" : "終了")
        : "次のセットへ";

      var left = 90;
      $("sheet-inner").innerHTML =
        '<div class="rest">' +
          '<div class="rest-k">休憩</div>' +
          '<div class="rest-v num" id="rest-v">' + fmtClock(left) + "</div>" +
        "</div>" +
        '<div class="rest-note">' + msg + "</div>" +
        '<div class="rest-actions">' +
          '<button class="ghost-btn" id="rest-add">＋30秒</button>' +
          '<button class="primary-btn" id="rest-skip">' + label + "</button>" +
        "</div>";

      clearInterval(restTimer);
      restTimer = setInterval(function () {
        left--;
        var el = $("rest-v");
        if (!el) { clearInterval(restTimer); return; }
        el.textContent = fmtClock(Math.max(0, left));
        if (left <= 0) { clearInterval(restTimer); toast("休憩おわり"); }
      }, 1000);

      $("rest-add").addEventListener("click", function () { left += 30; $("rest-v").textContent = fmtClock(left); });
      $("rest-skip").addEventListener("click", function () {
        clearInterval(restTimer);
        closeSheet();
        advance(isLastSet);
      });

      openSheet();
    }

    function advance(isLastSet) {
      if (isLastSet) {
        exIdx = Math.min(exIdx + 1, PLAN.exercises.length - 1);
        setNo = 1;
      } else {
        // 実際に記録済みのセット数から導く（多重呼び出しでも番号がずれない）
        setNo = Math.min(setsOf(curEx().name).length + 1, curEx().sets);
      }
      loadCurrent();
    }

    // ---- 完了サマリー ----
    function finish() {
      clearInterval(tickTimer);
      $("session").classList.remove("on");

      var sec = Math.floor((Date.now() - startedAt) / 1000);
      $("sum-time").textContent = fmtClock(sec);
      $("sum-vol").textContent = Math.round(volumeOf(logs)).toLocaleString("en-US");
      $("sum-sets").textContent = logs.length;
      $("sum-reps").textContent = logs.reduce(function (a, s) { return a + s.reps; }, 0);

      var wrap = $("prog-list");
      wrap.innerHTML = "";
      PLAN.exercises.forEach(function (e) {
        var mine = setsOf(e.name);
        if (!mine.length) return;
        var cur = progression[e.name].weight;
        var next = nextSessionWeight(mine, e.targetReps, e.step);
        var best = mine.reduce(function (m, s) {
          return Math.max(m, estimate1RM(s.weight, s.reps, s.rir));
        }, 0);

        var cls = next > cur ? "up" : (next < cur ? "down" : "keep");
        var mark = next > cur ? "↑ " : (next < cur ? "↓ " : "→ ");
        progression[e.name] = {
          weight: next,
          lastReps: mine[mine.length - 1].reps,
          lastRir: mine[mine.length - 1].rir
        };

        var row = document.createElement("div");
        row.className = "card prog-row";
        row.innerHTML =
          '<span class="prog-name">' + e.name +
            '<br><span style="font-size:11px;font-weight:500;color:var(--label-3)" class="num">' +
            "推定1RM " + fmtKg(Math.round(best * 10) / 10) + "kg</span></span>" +
          '<span class="prog-move num ' + cls + '">' + mark + fmtKg(next) + "kg</span>";
        wrap.appendChild(row);
      });

      $("summary").classList.add("on");
      saveSession();
    }

    /**
     * セッションをサーバに保存する。次回重量の正はサーバ側の計算なので、
     * 保存に成功したらサーバが返した値で progression を上書きする。
     */
    function saveSession() {
      if (!online) return;
      var body = {
        sets: logs.map(function (l) {
          return { exercise: l.exercise, setNo: l.setNo, weightKg: l.weight, reps: l.reps, rir: l.rir };
        }),
        plans: PLAN.exercises.map(function (e) {
          return { name: e.name, sets: e.sets, targetReps: e.targetReps, stepKg: e.step };
        })
      };
      api("/liff/workout", { method: "POST", body: JSON.stringify(body) })
        .then(function (res) {
          (res.summary && res.summary.updates || []).forEach(function (u) {
            if (progression[u.exercise]) progression[u.exercise].weight = u.weightKg;
          });
        })
        .catch(function () { toast("保存できなかった。通信を確認してね"); });
    }

    $("close-summary").addEventListener("click", function () {
      $("summary").classList.remove("on");
      renderHome();
      toast("記録しました");
    });

    // ==========================================================
    // シート・トースト
    // ==========================================================
    function openSheet() {
      clearTimeout(sheetClearTimer);
      $("sheet").classList.add("on");
      $("scrim").classList.add("on");
    }

    /**
     * シートを閉じる。走っている休憩タイマーを必ず止め、閉じ切ってから中身を破棄する。
     * DOM を残すと古いハンドラが生き続け、セット番号が二重に進む事故になる。
     */
    var sheetClearTimer = null;
    function closeSheet() {
      clearInterval(restTimer);
      restTimer = null;
      $("sheet").classList.remove("on");
      $("scrim").classList.remove("on");
      clearTimeout(sheetClearTimer);
      sheetClearTimer = setTimeout(function () { $("sheet-inner").innerHTML = ""; }, 450);
    }

    var toastTimer;
    function toast(t) {
      $("toast-text").textContent = t;
      $("toast").classList.add("on");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { $("toast").classList.remove("on"); }, 1800);
    }

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") closeSheet();
    });

    // ------------------------------------------------------------
    // Boot
    // ------------------------------------------------------------
    (async function boot() {
      renderHome();

      online = await connect();
      if (!online) {
        $("home-hint").textContent = "デモデータを表示しています。";
        return;
      }
      try {
        var data = await api("/liff/today", { method: "GET" });
        // 保存済みの次回開始重量があれば、それを今日の開始重量として使う
        (data.training.progression || []).forEach(function (p) {
          progression[p.exercise] = {
            weight: Number(p.weight_kg),
            lastReps: p.last_reps ?? 0,
            lastRir: p.last_rir ?? 0
          };
        });
        renderHome();
      } catch (_) {
        toast("読み込めなかった。通信を確認してね");
      }
    })();
  })();
</script>
